seed: 42
timesteps: 1000
model: # the underlying system for which you want to generate data
  configs: # list of systems (needs to be called "configs")
    - lorenz96: "data/systems/lorenz96.yaml" # refers to config file that stores params of that system
  non_linearity: 
    - low # weakly chaotic
    - med # standar chaotic 
    - hig # strongly chaotic
  mod_noise_types:
    - gaussian # for now we only support Gaussian noise
  mod_noise: # standard deviation of model error (Gaussian) in units: lower values -> less error
  # TODO needs to be added to the code somehow??
    - 0.1
    - 1.2
    - 2.0
observer: # there are many other options: https://github.com/StevePny/DataAssimBench/blob/main/dabench/observer/_observer.py
  density: # could be split up in temporal and local density (easy)
   # xxx sparsity: percentage sample-density (low sparsity: high sample density)
    - 0.75 # very dense
    - 0.50 # medium dense
    - 0.25 # not dense (sparse!)
  obs_noise_types: # for now we only support Gaussian noise
    - gaussian
  obs_noise: # standard deviation of observation error (Gaussian) in units: lower values -> less error
    # 68% of the observations will have an error within xx.xx units, the rest more 
    # should be adapted to different types of noise, not just Gaussian (more difficult); see line 346 in _observer.py 
    # - 1.2   # the average measurement device error
    # - 1.5   # slightly higher error
    # - 2.0   #  very high error       
    - 0.1
    - 1.0
    - 10



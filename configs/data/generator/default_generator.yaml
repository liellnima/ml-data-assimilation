# What size of noise for obs?

## additive noise level: 
## noise level should depend on the thing I am predicting, because it is unit-dependent
## Suggestion: order of magnitudes (snow depth: in-situ vs large area vs satellite)

## Snow: it is a concern when we generate the obs themselves: No negative values allowed! (truncate)

# What size of noise for model?

## Traditional: Model noise to account for the model error
## Weather: Gaussian noise
## Snow: But zero snow depth: negative
## --> We are already messing up the Gaussian term
## Option: Put all uncertainties into the model (initial cond, boundary cond (forcings), parameters)
## "You add noise to the model", not the data 

## What you infer: finding the noise / uncertainties in those params

## Two sources of errors:
# epsilon: obs. error / representation error [obs space]
# model error -> stochastic term; for snow that is difficult
# (errors come from upstream, the atmosphere, noise is injected through forcing)
# by correcting the forcing, you correct the model

# updating state directly (like in weather) does not work as well as the forcing approach

## What is usually done: Rerun the same system but with
